<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mahakaal Themes Cafe | Boutique Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<style>
:root {
  --bg:#05070a;
  --surface:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.1);
  --text:#f8f9fa;
  --muted:#94a3b8;
  --accent:#d4af37;
  --accent-glow:rgba(212,175,55,0.15);
  --pill-bg:rgba(212,175,55,0.1);
}
body.light{
  --bg:#f8fafc;
  --surface:#ffffff;
  --border:rgba(0,0,0,0.08);
  --text:#0f172a;
  --muted:#64748b;
  --accent:#854d0e;
  --accent-glow:rgba(133,77,14,0.05);
  --pill-bg:#f1f5f9;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
  padding:40px 24px 10px;
  text-align:center;
  position:relative;
}
.logo-container img{
  width:80px;
  height:80px;
  border-radius:24px;
  border:1px solid var(--border);
  object-fit:cover;
}
header h1{
  font-size:28px;
  font-weight:800;
  margin:15px 0 0;
  font-family:'Outfit',sans-serif;
}
#themeToggle{
  position:absolute;
  right:20px;
  top:20px;
  width:44px;
  height:44px;
  border-radius:50%;
  background:var(--surface);
  border:1px solid var(--border);
  cursor:pointer;
}

/* ===== YOUR ORIGINAL SLIDER DESIGN (CENTER FIXED) ===== */
#sliderContainer{
  max-width:600px;
  height:130px;
  margin:20px auto;
  padding:0 16px;
  border-radius:22px;
}
.swiper{
  border-radius:22px;
  overflow:hidden;
}
.swiper-slide{
  width:100%;
  height:130px;
  position:relative;
}
.slide-content{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  padding:18px 22px;
  background-size:cover!important;
  background-position:center!important;
}
.mini-offer-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,0.85),rgba(0,0,0,0.3));
  z-index:1;
}
.mini-offer-text{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  gap:6px;
  color:#fff;
}
.mini-chip{
  font-size:10px;
  font-weight:800;
  padding:4px 10px;
  border-radius:100px;
  backdrop-filter:blur(6px);
  width:fit-content;
  text-transform:uppercase;
}
.mini-main{
  font-size:16px;
  font-weight:600;
  font-family:'Outfit',sans-serif;
}
.mini-main strong{
  font-size:20px;
  font-weight:800;
  color:#ffd700;
}

/* ===== SCREENS ===== */
.screen{
  display:none;
  max-width:600px;
  margin:auto;
  padding:0 16px 140px;
}
.screen.active{display:block}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.category-card{
  height:180px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}
.category-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.category-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:20px;
}
.category-name{
  color:#fff;
  font-weight:800;
  text-transform:uppercase;
}

.inner-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:28px;
  padding:16px;
  margin-bottom:18px;
  display:flex;
  gap:18px;
}
.item-visual{
  width:90px;
  height:90px;
  border-radius:20px;
  object-fit:cover;
}
.item-name{
  font-weight:800;
  margin-bottom:8px;
}
.p-pill{
  background:var(--pill-bg);
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
}
.qty-control{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:6px;
  width:24px;
  height:24px;
  font-weight:800;
  cursor:pointer;
}

#cartBar{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 40px);
  max-width:500px;
  background:var(--accent);
  padding:18px 24px;
  border-radius:22px;
  display:none;
  justify-content:space-between;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

/* ===== ORDER SCREEN ===== */
.order-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid var(--border);
}
.order-actions{
  display:flex;
  gap:6px;
}
.remove-btn{
  background:#ff4d4d;
  border:none;
  color:#fff;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}
.total-box{
  margin-top:20px;
  padding:25px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
}
.tax-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}
.grand-total{
  border-top:1px dashed var(--border);
  margin-top:12px;
  padding-top:12px;
  display:flex;
  justify-content:space-between;
  font-weight:800;
}
</style>
</head>

<body>

<header>
<button id="themeToggle">🌙</button>
<div class="logo-container">
<img src="logo.png">
</div>
<h1 id="pageTitle">MTC Menu</h1>
</header>

<!-- ===== ORIGINAL THEME SLIDER (NOW PERFECTLY CENTERED) ===== -->
<div id="sliderContainer" class="swiper">
<div class="swiper-wrapper">

<div class="swiper-slide">
<div class="slide-content" style="background:url('https://images.unsplash.com/photo-1572490122747-3968b75cc699?q=80&w=1200');">
<div class="mini-offer-overlay"></div>
<div class="mini-offer-text">
<span class="mini-chip" style="background:var(--accent);color:#000;">House Special</span>
<span class="mini-main">Try our new <strong>Cinnamon Flavor</strong> in Frappe & Coffee</span>
</div>
</div>
</div>

<div class="swiper-slide">
<div class="slide-content" style="background:url('https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb?q=80&w=1200');">
<div class="mini-offer-overlay"></div>
<div class="mini-offer-text">
<span class="mini-chip" style="background:#ff8fab;color:#fff;">Chef Special</span>
<span class="mini-main">Creamy <strong>Pink Pasta</strong> at just <strong>₹209/-</strong></span>
</div>
</div>
</div>

<div class="swiper-slide">
<div class="slide-content" style="background:url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1200');">
<div class="mini-offer-overlay"></div>
<div class="mini-offer-text">
<span class="mini-chip" style="background:#3ec1d3;color:#000;">Freshly Baked</span>
<span class="mini-main">Try our <strong>Farm Fresh Pizza</strong></span>
</div>
</div>
</div>

</div>
<div class="swiper-pagination"></div>
</div>

<div id="categoryScreen" class="screen active">
<div class="grid" id="categoryGrid"></div>
</div>

<div id="itemsScreen" class="screen">
<button onclick="goBack()">← Back</button>
<div id="itemsContainer"></div>
</div>

<div id="orderScreen" class="screen">
<button onclick="goBack()">← Modify Order</button>
<div id="orderList"></div>

<div class="total-box">
<div class="tax-row"><span>Subtotal</span><span id="subTotal">₹0</span></div>
<div class="tax-row"><span>CGST (2.5%)</span><span id="cgst">₹0</span></div>
<div class="tax-row"><span>SGST (2.5%)</span><span id="sgst">₹0</span></div>
<div class="grand-total"><span>Total</span><span id="grandTotal">₹0</span></div>
</div>
</div>

<div id="cartBar" onclick="showOrder()">
<span id="cartCount">0 Items</span>
<span>Review Order →</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
new Swiper('#sliderContainer',{
loop:true,
autoplay:{delay:3500,disableOnInteraction:false},
pagination:{el:'.swiper-pagination',clickable:true}
});

let cart={};

function changeQty(name,price,delta){
if(!cart[name]&&delta>0){cart[name]={qty:delta,price};}
else if(cart[name]){
cart[name].qty+=delta;
if(cart[name].qty<=0)delete cart[name];
}
updateCartBar();
}

function updateCartBar(){
const count=Object.values(cart).reduce((s,i)=>s+i.qty,0);
document.getElementById("cartBar").style.display=count>0?"flex":"none";
document.getElementById("cartCount").innerText=count+" Items Selected";
}

function showOrder(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById("orderScreen").classList.add("active");
renderOrder();
}

function renderOrder(){
const list=document.getElementById("orderList");
list.innerHTML="";
let subtotal=0;
for(const key in cart){
const item=cart[key];
subtotal+=item.qty*item.price;
list.innerHTML+=`
<div class="order-item">
<div>${item.qty}x ${key}</div>
<div class="order-actions">
<button class="qty-control" onclick="changeQty('${key}',${item.price},-1);renderOrder()">−</button>
<button class="remove-btn" onclick="delete cart['${key}'];renderOrder()">Remove</button>
</div>
</div>`;
}
const tax=(subtotal*0.025);
document.getElementById("subTotal").innerText="₹"+subtotal;
document.getElementById("cgst").innerText="₹"+tax.toFixed(2);
document.getElementById("sgst").innerText="₹"+tax.toFixed(2);
document.getElementById("grandTotal").innerText="₹"+(subtotal+(tax*2)).toFixed(2);
updateCartBar();
}

function goBack(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById("categoryScreen").classList.add("active");
}

document.getElementById("themeToggle").onclick=()=>{
document.body.classList.toggle("light");
};
</script>

</body>
</html>
