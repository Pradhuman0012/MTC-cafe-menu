<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mahakaal Themes Cafe | Boutique Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<style>
:root {
  --bg: #05070a;
  --surface: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #f8f9fa;
  --muted: #94a3b8;
  --accent: #d4af37;
  --accent-glow: rgba(212,175,55,0.15);
  --pill-bg: rgba(212,175,55,0.1);
}

body{margin:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif}
.screen{display:none;max-width:600px;margin:auto;padding:0 16px 140px}
.screen.active{display:block}
header{text-align:center;padding:40px 24px 10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.category-card{height:180px;border-radius:28px;overflow:hidden;border:1px solid var(--border);cursor:pointer}
.category-card img{width:100%;height:100%;object-fit:cover}
.category-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);display:flex;align-items:flex-end;justify-content:center;padding-bottom:20px}
.category-name{color:#fff;font-weight:800;font-size:15px}
.inner-item{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:16px;margin-bottom:18px;display:flex;gap:18px}
.item-visual{width:90px;height:90px;border-radius:20px;object-fit:cover}
.item-name{font-size:18px;font-weight:800;margin-bottom:10px}
.p-pill{background:var(--pill-bg);border:1px solid var(--border);padding:6px 10px;border-radius:14px;cursor:pointer}
.qty-control{background:var(--accent);color:#fff;border:none;border-radius:6px;width:24px;height:24px;font-weight:800}
#cartBar{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:500px;background:var(--accent);padding:18px 24px;border-radius:22px;display:none;justify-content:space-between;align-items:center;color:#fff;font-weight:800}
.total-box{margin-top:20px;padding:25px;background:var(--surface);border:1px solid var(--border);border-radius:24px}
.tax-row{display:flex;justify-content:space-between;color:var(--muted);font-size:14px;margin-bottom:8px}
.grand-total{border-top:1px dashed var(--border);margin-top:12px;padding-top:12px;display:flex;justify-content:space-between}
.clear-btn{background:rgba(255,77,77,0.1);color:#ff4d4d;border:1px solid rgba(255,77,77,0.2);width:100%;padding:15px;border-radius:15px;font-weight:800;margin-top:20px}

/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999}
.modal-box{background:#111;padding:25px;border-radius:16px;width:90%;max-width:380px}
.modal-box input{width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:none}

/* success */
.success{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#05070a;z-index:9999}
</style>
</head>

<body>

<header>
<h1 id="pageTitle">MTC Menu</h1>
</header>

<div id="categoryScreen" class="screen active">
<div class="grid" id="categoryGrid"></div>
</div>

<div id="itemsScreen" class="screen">
<div id="itemsContainer"></div>
</div>

<div id="orderScreen" class="screen">
<h3>Review Order</h3>
<div id="orderList"></div>

<div class="total-box">
<div class="tax-row"><span>Subtotal</span><span id="subTotal">₹0</span></div>
<div class="tax-row"><span>CGST (2.5%)</span><span id="cgst">₹0</span></div>
<div class="tax-row"><span>SGST (2.5%)</span><span id="sgst">₹0</span></div>
<div class="grand-total"><span>Total</span><span id="grandTotal">₹0</span></div>
</div>

<button class="clear-btn" onclick="clearCart()">Clear Order</button>

<button onclick="openOrderModal()" style="
margin-top:15px;
width:100%;
padding:16px;
background:var(--accent);
border:none;
border-radius:16px;
font-weight:800;
color:white;
font-size:16px;
cursor:pointer;
">
PLACE ORDER
</button>

</div>

<div id="cartBar" onclick="showOrder()">
<span id="cartCount">0 Items Selected</span>
<span>REVIEW ORDER →</span>
</div>


<!-- ORDER MODAL -->
<div id="orderModal" class="modal">
<div class="modal-box">

<h3>Enter Details</h3>

<input id="custName" placeholder="Your Name">
<input id="custPhone" placeholder="Phone Number" type="tel">

<div style="display:flex;align-items:center;gap:8px">
<label>Table Number</label>
<button onclick="toggleTableInfo()">i</button>
</div>

<div id="tableInfo" style="display:none;font-size:12px;color:#aaa;margin-bottom:8px">
Table number QR code par likha hua hai
</div>

<input id="custTable" placeholder="Table Number (ex: T1)">

<div style="display:flex;gap:10px">
<button onclick="closeOrderModal()">Cancel</button>
<button onclick="confirmOrder()">Confirm</button>
</div>

</div>
</div>


<!-- SUCCESS -->
<div id="successScreen" class="success">
<h1 style="font-size:60px">✅</h1>
<h2>Order Placed!</h2>
<p>Your order has been sent to counter</p>
</div>


<script>

let cart={}
let menuData={}
let currentCategoryKey=null

function changeQty(name,size,price,delta){
const key=name+"-"+size
if(!cart[key]){
if(delta>0)cart[key]={name,size,price,qty:delta}
}else{
cart[key].qty+=delta
if(cart[key].qty<=0)delete cart[key]
}
updateCartBar()
}

function updateCartBar(){
const count=Object.values(cart).reduce((s,i)=>s+i.qty,0)
document.getElementById("cartCount").textContent=count+" Items Selected"
document.getElementById("cartBar").style.display=count>0?"flex":"none"
}

function showOrder(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById("orderScreen").classList.add("active")

let subtotal=0
const list=document.getElementById("orderList")
list.innerHTML=""

Object.values(cart).forEach(item=>{
subtotal+=item.price*item.qty
list.innerHTML+=`
<div>
<b>${item.name}</b> (${item.size}) x ${item.qty}
</div>`
})

const tax=Math.round(subtotal*0.025*100)/100
document.getElementById("subTotal").textContent="₹"+subtotal
document.getElementById("cgst").textContent="₹"+tax
document.getElementById("sgst").textContent="₹"+tax
document.getElementById("grandTotal").textContent="₹"+(subtotal+tax*2)
}

function clearCart(){
cart={}
updateCartBar()
}

function openOrderModal(){
document.getElementById("orderModal").style.display="flex"
}

function closeOrderModal(){
document.getElementById("orderModal").style.display="none"
}

function toggleTableInfo(){
const el=document.getElementById("tableInfo")
el.style.display=el.style.display==="block"?"none":"block"
}

async function confirmOrder(){

const name=document.getElementById("custName").value.trim()
const phone=document.getElementById("custPhone").value.trim()
const table=document.getElementById("custTable").value.trim()

if(!name){alert("Enter name");return}
if(!phone||phone.length<10){alert("Enter valid phone");return}
if(!table){alert("Enter table number");return}

const items=Object.values(cart)

const subtotal=parseFloat(document.getElementById("subTotal").textContent.replace("₹",""))
const total=parseFloat(document.getElementById("grandTotal").textContent.replace("₹",""))

const payload={
source:"qr_menu",
customer_name:name,
customer_phone:phone,
table:table,
subtotal:subtotal,
total:total,
items:items.map(i=>({
name:i.name,
size:i.size,
qty:i.qty,
price:i.price
}))
}

try{

const res=await fetch(
"https://mtc-order-api.onrender.com/orders",
{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(payload)
})

if(!res.ok)throw new Error()

showSuccess()

}catch(e){
alert("Order failed")
}

}

function showSuccess(){

document.getElementById("orderModal").style.display="none"
document.getElementById("successScreen").style.display="flex"

cart={}
updateCartBar()

setTimeout(()=>{
document.getElementById("successScreen").style.display="none"
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById("categoryScreen").classList.add("active")
},2500)

}

</script>

</body>
</html>
