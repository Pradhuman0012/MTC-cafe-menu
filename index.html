<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mahakaal Themes Cafe | Boutique Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<style>
:root {
  --bg: #05070a;
  --surface: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
  --text: #f8f9fa;
  --muted: #94a3b8;
  --accent: #d4af37;
  --accent-glow: rgba(212, 175, 55, 0.15);
  --pill-bg: rgba(212, 175, 55, 0.1);
}

body.light {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: rgba(0, 0, 0, 0.08);
  --text: #0f172a;
  --muted: #64748b;
  --accent: #854d0e;
  --accent-glow: rgba(133, 77, 14, 0.05);
  --pill-bg: #f1f5f9;
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; overflow-x: hidden; }

.glow { position: fixed; width: 400px; height: 400px; background: var(--accent-glow); border-radius: 50%; filter: blur(100px); z-index: -1; top: -150px; left: -100px; }

header { padding: 40px 24px 10px; text-align: center; position: relative; }
.logo-container img { width: 80px; height: 80px; border-radius: 24px; border: 1px solid var(--border); object-fit: cover; }
header h1 { font-size: 28px; font-weight: 800; margin: 15px 0 0; font-family: 'Outfit', sans-serif; }

#themeToggle { position: absolute; top: 25px; right: 25px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

.screen { display: none; max-width: 600px; margin: auto; padding: 0 16px 140px; }
.screen.active { display: block; }

#cartBar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 500px; background: var(--accent); padding: 18px 24px; border-radius: 22px; display: none; justify-content: space-between; align-items: center; color: #fff; font-weight: 800; cursor: pointer; z-index: 1000; }

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.modal-box{
background:#111;
padding:25px;
border-radius:16px;
width:90%;
max-width:380px;
}

.modal-box input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

.success{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
background:#05070a;
z-index:9999;
}

</style>
</head>

<body>
<div class="glow"></div>

<header>
<button id="themeToggle">🌙</button>
<div class="logo-container"><img src="logo.png"></div>
<h1 id="pageTitle">MTC Menu</h1>
</header>


<!-- EXISTING CONTENT REMAINS SAME -->

<div id="orderScreen" class="screen">
<div id="orderList"></div>

<div class="total-box">
<div class="tax-row"><span>Subtotal</span><span id="subTotal">₹0</span></div>
<div class="tax-row"><span>CGST (2.5%)</span><span id="cgst">₹0</span></div>
<div class="tax-row"><span>SGST (2.5%)</span><span id="sgst">₹0</span></div>
<div class="grand-total"><span>Grand Total</span><span id="grandTotal">₹0</span></div>
</div>

<button class="clear-btn" onclick="clearCart()">Clear Order</button>

<button onclick="openOrderModal()" style="
margin-top:15px;
width:100%;
padding:16px;
background:var(--accent);
border:none;
border-radius:16px;
font-weight:800;
color:white;
font-size:16px;
cursor:pointer;
">
PLACE ORDER
</button>

</div>

<div id="cartBar" onclick="showOrder()">
<span id="cartCount">0 Items Selected</span>
<span>REVIEW ORDER →</span>
</div>


<!-- ORDER MODAL -->
<div id="orderModal" class="modal">

<div class="modal-box">

<h3>Enter Details</h3>

<input id="custName" placeholder="Your Name">

<input id="custPhone" placeholder="Phone Number">

<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
<label>Table Number</label>
<button onclick="toggleTableInfo()">i</button>
</div>

<div id="tableInfo" style="display:none;font-size:12px;color:#aaa;margin-bottom:10px;">
Table number QR code par likha hua hai
</div>

<input id="custTable" placeholder="Table Number (ex: T1)">

<div style="display:flex;gap:10px">
<button onclick="closeOrderModal()">Cancel</button>
<button onclick="confirmOrder()">Confirm</button>
</div>

</div>
</div>


<!-- SUCCESS SCREEN -->
<div id="successScreen" class="success">
<h1 style="font-size:60px;">✅</h1>
<h2>Order Placed!</h2>
<p>Your order has been sent to counter</p>
</div>


<script>

function openOrderModal(){

const savedName=localStorage.getItem("mtc_name")
const savedPhone=localStorage.getItem("mtc_phone")
const savedTable=localStorage.getItem("mtc_table")

if(savedName) document.getElementById("custName").value=savedName
if(savedPhone) document.getElementById("custPhone").value=savedPhone
if(savedTable) document.getElementById("custTable").value=savedTable

document.getElementById("orderModal").style.display="flex"

}

function closeOrderModal(){
document.getElementById("orderModal").style.display="none"
}

function toggleTableInfo(){
const el=document.getElementById("tableInfo")
el.style.display=el.style.display==="block"?"none":"block"
}

async function confirmOrder(){

const name=document.getElementById("custName").value.trim()
const phone=document.getElementById("custPhone").value.trim()
const table=document.getElementById("custTable").value.trim()

if(!name){alert("Enter name");return}
if(!phone||phone.length<10){alert("Enter valid phone");return}
if(!table){alert("Enter table number");return}

localStorage.setItem("mtc_name",name)
localStorage.setItem("mtc_phone",phone)
localStorage.setItem("mtc_table",table)

const items=Object.values(cart)

const subtotal=parseFloat(document.getElementById("subTotal").textContent.replace("₹",""))
const total=parseFloat(document.getElementById("grandTotal").textContent.replace("₹",""))

const payload={
source:"qr_menu",
customer_name:name,
customer_phone:phone,
table:table,
subtotal:subtotal,
total:total,
items:items.map(i=>({
name:i.name,
size:i.size,
qty:i.qty,
price:i.price
}))
}

try{

const res=await fetch(
"https://mtc-order-api.onrender.com/orders",
{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(payload)
})

if(!res.ok) throw new Error()

showSuccess()

}catch(e){
alert("Order failed")
}

}

function showSuccess(){

document.getElementById("orderModal").style.display="none"
document.getElementById("successScreen").style.display="flex"

cart={}
updateCartBar()

setTimeout(()=>{

document.getElementById("successScreen").style.display="none"
goBackInternal()

},2500)

}

</script>

</body>
</html>
